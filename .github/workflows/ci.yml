name: ci

on:
  pull_request:
    paths-ignore: ['homebridge/**']
  push:
    branches: [main, 'renovate/**']
    paths-ignore: ['homebridge/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - uses: Swatinem/rust-cache@v2

      - run: mise run check:rust

      - name: Validate systemd unit template
        run: |
          tmp="$(mktemp -d)"
          cp /bin/true "$tmp/somfy"
          getent group gpio >/dev/null || sudo groupadd gpio
          cargo run --quiet --no-default-features --features hw --example render_unit -- "$USER" "$tmp/somfy" > "$tmp/somfy.service"
          systemd-analyze verify --no-pager "$tmp/somfy.service"

  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run build
