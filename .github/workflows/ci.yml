name: ci

on:
  pull_request:
  push:
    branches: [main, 'renovate/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - uses: Swatinem/rust-cache@v2

      - run: mise run check:ci

      - name: Validate systemd unit template
        run: |
          tmp="$(mktemp -d)"
          cp /bin/true "$tmp/somfy"
          getent group gpio >/dev/null || sudo groupadd gpio
          cargo run --quiet --example render_unit -- "$USER" "$tmp/somfy" > "$tmp/somfy.service"
          systemd-analyze verify --no-pager "$tmp/somfy.service"
