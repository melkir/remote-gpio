name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - run: rustup target add armv7-unknown-linux-gnueabihf

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: armv7-release
          cache-targets: true

      - run: mise run cross-build

      - name: Stage artifacts
        run: |
          mkdir -p out
          cp target/armv7-unknown-linux-gnueabihf/release/somfy out/somfy
          (cd out && sha256sum somfy > SHA256SUMS)

      - name: Publish nightly prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: "nightly (moving)"
          prerelease: true
          files: |
            out/somfy
            out/SHA256SUMS
          body: |
            Moving prerelease from the main branch.
            Commit: ${{ github.sha }}

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            out/somfy
            out/SHA256SUMS
