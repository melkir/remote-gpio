[package]
name = "remote-gpio"
version = "0.1.0"
edition = "2021"

[features]
default = ["fake"]
hw = ["dep:gpiocdev"]
fake = []

[dependencies]
axum = { version = "0.8.9", features = ["json", "macros", "form", "ws"] }
tokio = { version = "1.51.0", features = ["rt", "macros", "sync", "time"] }
tower-http = { version = "0.6.8", features = ["fs", "trace", "cors"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
gpiocdev = { version = "0.8.0", features = ["uapi_v2", "async_tokio"], optional = true }
futures = "0.3.32"

[profile.release]
strip = true  # Automatically strip symbols from the binary.
