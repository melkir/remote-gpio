[package]
name = "somfy"
version = "0.1.0"
edition = "2021"

[features]
default = ["fake"]
hw = ["dep:gpiocdev"]
fake = []

[dependencies]
axum = { version = "0.8.9", features = ["json", "macros", "form", "ws"] }
tokio = { version = "1.51.0", features = ["rt", "macros", "sync", "time"] }
tower-http = { version = "0.6.8", features = ["trace", "cors"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
anyhow = "1.0.102"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
gpiocdev = { version = "0.8.0", features = ["uapi_v2", "async_tokio"], optional = true }
futures = "0.3.32"

clap = { version = "4.5", features = ["derive", "env"] }
rust-embed = { version = "8.5", features = ["mime-guess"] }
mime_guess = "2.0"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-native-roots-no-provider", "json", "stream", "http2"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
sha2 = "0.11.0"
hex = "0.4"
tempfile = "3.12"
nix = { version = "0.31", features = ["user"] }
semver = "1.0"

[build-dependencies]
anyhow = "1.0.102"
vergen-gix = { version = "9.1", features = ["build"] }

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
