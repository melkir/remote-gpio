[package]
name = "somfy"
version = "0.1.2"
edition = "2021"

[features]
default = ["fake"]
hw = ["dep:gpiocdev"]
fake = []

[dependencies]
axum = { version = "0.8", features = ["json", "macros", "form", "ws"] }
tokio = { version = "1.52", features = ["rt", "macros", "sync", "time"] }
tower-http = { version = "0.6", features = ["trace", "cors"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
gpiocdev = { version = "0.8", features = ["uapi_v2", "async_tokio"], optional = true }
futures-util = "0.3"

clap = { version = "4.6", features = ["derive", "env"] }
rust-embed = { version = "8.11", features = ["mime-guess"] }
mime_guess = "2.0"
reqwest = { version = "0.13.2", default-features = false, features = [
  "rustls-no-provider",
  "json",
  "stream",
  "http2",
] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
sha2 = "0.11"
hex = "0.4"
tempfile = "3.27"
nix = { version = "0.31", features = ["user"] }
semver = "1.0"

[build-dependencies]
anyhow = "1.0"
vergen-gix = { version = "9.1", features = ["build"] }

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
