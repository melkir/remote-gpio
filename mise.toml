[tools]
rust = { version = "stable", profile = "default" }
bun = "1"
zig = "0.15.2"
"cargo:cargo-release" = "1.1.2"
"cargo:cargo-zigbuild" = "0.22.2"

[tasks."install:rust"]
hide = true
run = "cargo fetch"

[tasks."install:app"]
hide = true
run = "bun --cwd=app install --frozen-lockfile"

[tasks.install]
description = "Install repo dependencies"
depends = ["install:rust", "install:app"]

[tasks.dev]
description = "Run the app locally"
run = [{ tasks = ["server-dev", "app-dev"] }]

[tasks.build]
description = "Build the production app"
depends = ["install"]
run = ["bun --cwd=app run build", "cargo build --release"]

[tasks.check]
description = "Local validation (default/fake features)"
depends = ["install"]
run = [
  "cargo fmt --all -- --check",
  "bun --cwd=app run format:check",
  "bun --cwd=app run lint",
  "bun --cwd=app run typecheck",
  "cargo clippy --all-targets",
  "cargo test",
]

[tasks."check:rust"]
description = "Rust validation (telis features, warnings denied)"
depends = ["install:rust"]
run = [
  "cargo fmt --all -- --check",
  "cargo clippy --all-targets --no-default-features --features telis -- -D warnings",
  "cargo test --all-targets --no-default-features --features telis",
]

[tasks."check:app"]
description = "Frontend validation"
depends = ["install:app"]
run = [
  "bun --cwd=app run format:check",
  "bun --cwd=app run lint",
  "bun --cwd=app run typecheck",
  "bun --cwd=app run build",
]

[tasks.fmt]
description = "Format the codebase"
run = ["cargo fmt --all", "bun --cwd=app run format"]

[tasks.cross-build]
description = "Cross-compile for Raspberry Pi with cargo-zigbuild"
depends = ["install"]
run = [
  "bun --cwd=app run build",
  "cargo zigbuild --release --no-default-features --features telis --target armv7-unknown-linux-gnueabihf.2.31",
]

[tasks.release]
description = "Create a new release"
run = "cargo release"

[tasks.server-dev]
hide = true
run = "cargo run"

[tasks.app-dev]
hide = true
run = "bun --cwd=app run dev"
